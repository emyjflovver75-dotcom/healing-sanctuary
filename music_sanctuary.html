<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Sanctuary — Our Healing Sanctuary</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --dark: #1a1510;
  --purple: #6B4F8C;
  --purple-light: #9b7bc0;
  --sage: #7a9e7e;
  --sage-light: #a8c5ac;
  --gold-light: #e8d5b0;
  --font-display: 'Cormorant Garamond', Georgia, serif;
  --font-body: 'DM Sans', sans-serif;
}

body {
  background: #0f0d0b;
  color: white;
  font-family: var(--font-body);
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 20%, rgba(107,79,140,0.12) 0%, transparent 60%),
    radial-gradient(ellipse 60% 80% at 80% 80%, rgba(122,158,126,0.08) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

/* HEADER */
.header {
  padding: 20px 40px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  position: relative;
  z-index: 10;
}

.header-logo {
  font-family: var(--font-display);
  font-size: 16px;
  font-style: italic;
  color: var(--gold-light);
  opacity: 0.8;
}

.header-center {
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 300;
  letter-spacing: 0.05em;
}

.header-back {
  font-size: 11px;
  color: rgba(255,255,255,0.35);
  cursor: pointer;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  text-decoration: none;
  transition: color 0.2s;
}

.header-back:hover { color: var(--sage-light); }

/* MAIN */
.main {
  display: grid;
  grid-template-columns: 1fr 340px;
  min-height: calc(100vh - 65px);
  position: relative;
  z-index: 1;
}

/* NOW PLAYING */
.now-playing {
  padding: 60px 40px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

/* Vinyl */
.vinyl-wrap {
  position: relative;
  margin-bottom: 44px;
}

.vinyl-glow {
  position: absolute;
  inset: -30px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(107,79,140,0.25) 0%, transparent 70%);
  animation: glowPulse 3s ease-in-out infinite;
}

@keyframes glowPulse {
  0%, 100% { opacity: 0.5; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.08); }
}

.vinyl {
  width: 260px; height: 260px;
  border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, #2a2020, #0f0d0b);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.06),
    0 20px 80px rgba(0,0,0,0.7),
    0 0 60px rgba(107,79,140,0.2);
  animation: spin 14s linear infinite;
  animation-play-state: paused;
  transition: animation-play-state 0.3s;
}

.vinyl.playing { animation-play-state: running; }

@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

.vinyl::before {
  content: '';
  position: absolute;
  inset: 24px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.03);
  box-shadow:
    0 0 0 24px rgba(255,255,255,0.02),
    0 0 0 48px rgba(255,255,255,0.015);
}

.vinyl-center {
  width: 72px; height: 72px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--purple), var(--sage));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  z-index: 1;
  box-shadow: 0 4px 24px rgba(107,79,140,0.5);
}

/* Song info */
.song-info { text-align: center; margin-bottom: 36px; }

.song-mood {
  font-size: 10px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--sage-light);
  margin-bottom: 10px;
}

.song-title {
  font-family: var(--font-display);
  font-size: 38px;
  font-weight: 300;
  color: white;
  line-height: 1.15;
  margin-bottom: 6px;
}

.song-artist {
  font-size: 13px;
  color: rgba(255,255,255,0.35);
  letter-spacing: 0.04em;
}

/* Progress */
.progress-wrap { width: 100%; max-width: 400px; margin-bottom: 28px; }

.progress-times {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: rgba(255,255,255,0.25);
  margin-bottom: 8px;
}

.progress-track {
  height: 4px;
  background: rgba(255,255,255,0.08);
  border-radius: 2px;
  cursor: pointer;
  position: relative;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--purple), var(--sage));
  border-radius: 2px;
  width: 0%;
  transition: width 1s linear;
  position: relative;
}

.progress-fill::after {
  content: '';
  position: absolute;
  right: -5px; top: -3px;
  width: 10px; height: 10px;
  border-radius: 50%;
  background: white;
  box-shadow: 0 0 8px rgba(107,79,140,0.6);
}

/* Controls */
.controls {
  display: flex;
  align-items: center;
  gap: 20px;
  margin-bottom: 36px;
}

.ctrl-btn {
  width: 44px; height: 44px;
  border: none;
  background: rgba(255,255,255,0.05);
  border-radius: 50%;
  color: rgba(255,255,255,0.4);
  font-size: 15px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-body);
}

.ctrl-btn:hover {
  background: rgba(255,255,255,0.1);
  color: white;
  transform: scale(1.05);
}

.play-btn {
  width: 70px; height: 70px;
  background: linear-gradient(135deg, var(--purple), var(--sage));
  border: none;
  border-radius: 50%;
  color: white;
  font-size: 22px;
  cursor: pointer;
  transition: all 0.25s;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 8px 32px rgba(107,79,140,0.45);
}

.play-btn:hover {
  transform: scale(1.08);
  box-shadow: 0 12px 44px rgba(107,79,140,0.6);
}

/* Volume */
.volume-wrap {
  display: flex;
  align-items: center;
  gap: 12px;
  width: 100%;
  max-width: 400px;
}

.vol-icon { font-size: 13px; color: rgba(255,255,255,0.25); }

input[type=range] {
  flex: 1;
  height: 3px;
  background: rgba(255,255,255,0.08);
  border-radius: 2px;
  appearance: none;
  outline: none;
  cursor: pointer;
}

input[type=range]::-webkit-slider-thumb {
  appearance: none;
  width: 13px; height: 13px;
  border-radius: 50%;
  background: var(--purple-light);
  cursor: pointer;
}

audio { display: none; }

/* PLAYLIST */
.playlist {
  border-left: 1px solid rgba(255,255,255,0.06);
  display: flex;
  flex-direction: column;
}

.playlist-header {
  padding: 28px 24px 18px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}

.playlist-label {
  font-size: 9px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--sage);
  margin-bottom: 5px;
}

.playlist-title {
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 300;
}

/* Mood filters */
.mood-filters {
  padding: 14px 24px;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}

.mood-btn {
  font-size: 10.5px;
  padding: 5px 11px;
  border-radius: 14px;
  border: 1px solid rgba(255,255,255,0.08);
  background: transparent;
  color: rgba(255,255,255,0.35);
  cursor: pointer;
  transition: all 0.2s;
  font-family: var(--font-body);
}

.mood-btn:hover { border-color: var(--purple-light); color: var(--purple-light); }
.mood-btn.active { background: rgba(107,79,140,0.18); border-color: var(--purple); color: var(--purple-light); }

/* Song list */
.song-list { flex: 1; overflow-y: auto; padding: 8px 0; }
.song-list::-webkit-scrollbar { width: 3px; }
.song-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

.song-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 24px;
  cursor: pointer;
  transition: all 0.2s;
  border-left: 3px solid transparent;
}

.song-item:hover { background: rgba(255,255,255,0.03); border-left-color: rgba(107,79,140,0.3); }
.song-item.active { background: rgba(107,79,140,0.1); border-left-color: var(--purple); }

.song-num {
  width: 22px;
  font-size: 12px;
  color: rgba(255,255,255,0.2);
  text-align: center;
  flex-shrink: 0;
}

.song-item.active .song-num { color: var(--purple-light); }

.bars {
  display: none;
  gap: 2px;
  align-items: flex-end;
  height: 14px;
}

.song-item.active .bars { display: flex; }
.song-item.active .num-txt { display: none; }

.bar {
  width: 3px;
  border-radius: 2px;
  background: var(--purple-light);
  animation: barUp 0.9s ease-in-out infinite;
}

.bar:nth-child(1) { animation-delay: 0s; }
.bar:nth-child(2) { animation-delay: 0.2s; }
.bar:nth-child(3) { animation-delay: 0.4s; }

@keyframes barUp {
  0%, 100% { height: 3px; }
  50% { height: 14px; }
}

.song-icon {
  width: 38px; height: 38px;
  border-radius: 10px;
  background: rgba(255,255,255,0.05);
  display: flex; align-items: center; justify-content: center;
  font-size: 17px;
  flex-shrink: 0;
}

.song-item.active .song-icon {
  background: rgba(107,79,140,0.2);
}

.song-meta { flex: 1; min-width: 0; }

.song-name {
  font-size: 13px;
  font-weight: 400;
  color: rgba(255,255,255,0.8);
  margin-bottom: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.song-item.active .song-name { color: white; font-weight: 500; }

.song-tag {
  font-size: 10px;
  color: rgba(255,255,255,0.25);
  letter-spacing: 0.04em;
}

.song-item.active .song-tag { color: var(--sage-light); }

/* Note about streaming */
.stream-note {
  padding: 16px 24px;
  border-top: 1px solid rgba(255,255,255,0.06);
  font-size: 11px;
  color: rgba(255,255,255,0.2);
  line-height: 1.5;
  text-align: center;
}
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">Our Healing Sanctuary</div>
  <div class="header-center">🎵 Music Sanctuary</div>
  <a href="index.html" class="header-back">← Back to App</a>
</div>

<div class="main">

  <!-- NOW PLAYING -->
  <div class="now-playing">
    <div class="vinyl-wrap">
      <div class="vinyl-glow"></div>
      <div class="vinyl" id="vinyl">
        <div class="vinyl-center" id="vinylEmoji">🌿</div>
      </div>
    </div>

    <div class="song-info">
      <div class="song-mood" id="songMood">Grounding & Calm</div>
      <div class="song-title" id="songTitle">Keep Your Heart</div>
      <div class="song-artist">Emy J · Our Healing Sanctuary</div>
    </div>

    <div class="progress-wrap">
      <div class="progress-times">
        <span id="currentTime">0:00</span>
        <span id="totalTime">0:00</span>
      </div>
      <div class="progress-track" onclick="seekAudio(event)">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>

    <div class="controls">
      <button class="ctrl-btn" onclick="prevSong()" title="Previous">⏮</button>
      <button class="ctrl-btn" onclick="shuffleSongs()" title="Shuffle">🔀</button>
      <button class="play-btn" id="playBtn" onclick="togglePlay()">▶</button>
      <button class="ctrl-btn" onclick="toggleRepeat()" id="repeatBtn" title="Repeat">🔁</button>
      <button class="ctrl-btn" onclick="nextSong()" title="Next">⏭</button>
    </div>

    <div class="volume-wrap">
      <span class="vol-icon">🔈</span>
      <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.8" oninput="setVolume(this.value)">
      <span class="vol-icon">🔊</span>
    </div>

    <audio id="audioPlayer" preload="none"></audio>
  </div>

  <!-- PLAYLIST -->
  <div class="playlist">
    <div class="playlist-header">
      <div class="playlist-label">✦ Curated for healing</div>
      <div class="playlist-title">Your Sanctuary Playlist</div>
    </div>

    <div class="mood-filters">
      <button class="mood-btn active" onclick="filterMood('all', this)">All</button>
      <button class="mood-btn" onclick="filterMood('grounding', this)">🌿 Grounding</button>
      <button class="mood-btn" onclick="filterMood('emotional', this)">💜 Emotional</button>
      <button class="mood-btn" onclick="filterMood('morning', this)">☀️ Morning</button>
      <button class="mood-btn" onclick="filterMood('sleep', this)">🌙 Sleep</button>
      <button class="mood-btn" onclick="filterMood('strength', this)">💪 Strength</button>
    </div>

    <div class="song-list" id="songList"></div>

    <div class="stream-note">
      🌿 Original music by Emy J · Our Healing Sanctuary<br>
      All songs created with love for your healing journey
    </div>
  </div>
</div>

<script>
const songs = [
  {
    id: 1,
    title: "Keep Your Heart",
    mood: "Grounding & Calm",
    moodKey: "grounding",
    emoji: "🌿",
    fileId: "1R4PfQ9mjGPKN5MycFF1gm2t-U6T6Vtqx"
  },
  {
    id: 2,
    title: "Safe to Feel",
    mood: "Emotional Release",
    moodKey: "emotional",
    emoji: "💜",
    fileId: "1IWq_qSjDKX8xE6orwtVT10TLgwik9Wre"
  },
  {
    id: 3,
    title: "Morning Move",
    mood: "Morning Energy",
    moodKey: "morning",
    emoji: "☀️",
    fileId: "1vZgl5KxlxBGqhp4UKwVq8NKp6FtNF1wp"
  },
  {
    id: 4,
    title: "Soft Lanterns of the Heart",
    mood: "Sleep & Rest",
    moodKey: "sleep",
    emoji: "🌙",
    fileId: "1KPPmR5IL4cJwmxBNsOYblN6_Ghebgarf"
  },
  {
    id: 5,
    title: "He Will Heal Me",
    mood: "Strength & Empowerment",
    moodKey: "strength",
    emoji: "💪",
    fileId: "10yKdTgZRcb_tTHPGy7TGdr7W7EzAzJ3Y",
    featured: true
  }
];

let currentIndex = 0;
let isPlaying = false;
let isRepeat = false;
let currentFilter = 'all';

const audio = document.getElementById('audioPlayer');
const playBtn = document.getElementById('playBtn');
const vinyl = document.getElementById('vinyl');
const progressFill = document.getElementById('progressFill');
const currentTimeEl = document.getElementById('currentTime');
const totalTimeEl = document.getElementById('totalTime');

function getStreamUrl(fileId) {
  return `https://drive.google.com/uc?export=download&id=${fileId}`;
}

function formatTime(sec) {
  if (isNaN(sec)) return '0:00';
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60);
  return `${m}:${s.toString().padStart(2, '0')}`;
}

function loadSong(index) {
  currentIndex = index;
  const song = songs[index];
  
  document.getElementById('songTitle').textContent = song.title;
  document.getElementById('songMood').textContent = song.mood;
  document.getElementById('vinylEmoji').textContent = song.emoji;
  
  audio.src = getStreamUrl(song.fileId);
  progressFill.style.width = '0%';
  currentTimeEl.textContent = '0:00';
  totalTimeEl.textContent = '0:00';
  
  renderList();
}

function togglePlay() {
  if (isPlaying) {
    audio.pause();
    isPlaying = false;
    playBtn.textContent = '▶';
    vinyl.classList.remove('playing');
  } else {
    audio.play().catch(() => {
      alert('⚠️ Please make sure your Google Drive folder is set to "Anyone with the link can view" and try again.');
    });
    isPlaying = true;
    playBtn.textContent = '⏸';
    vinyl.classList.add('playing');
  }
}

function nextSong() {
  const filtered = getFiltered();
  const currentFiltered = filtered.findIndex(s => s.id === songs[currentIndex].id);
  const nextFiltered = (currentFiltered + 1) % filtered.length;
  loadSong(songs.indexOf(filtered[nextFiltered]));
  if (isPlaying) audio.play();
}

function prevSong() {
  const filtered = getFiltered();
  const currentFiltered = filtered.findIndex(s => s.id === songs[currentIndex].id);
  const prevFiltered = (currentFiltered - 1 + filtered.length) % filtered.length;
  loadSong(songs.indexOf(filtered[prevFiltered]));
  if (isPlaying) audio.play();
}

function shuffleSongs() {
  const filtered = getFiltered();
  const random = filtered[Math.floor(Math.random() * filtered.length)];
  loadSong(songs.indexOf(random));
  if (isPlaying) audio.play();
}

function toggleRepeat() {
  isRepeat = !isRepeat;
  document.getElementById('repeatBtn').style.color = isRepeat ? '#9b7bc0' : '';
  audio.loop = isRepeat;
}

function setVolume(val) {
  audio.volume = val;
}

function seekAudio(e) {
  const rect = e.currentTarget.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  if (audio.duration) {
    audio.currentTime = pct * audio.duration;
  }
}

function getFiltered() {
  if (currentFilter === 'all') return songs;
  return songs.filter(s => s.moodKey === currentFilter);
}

function filterMood(mood, btn) {
  currentFilter = mood;
  document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

function renderList() {
  const list = document.getElementById('songList');
  const filtered = getFiltered();
  
  list.innerHTML = filtered.map((song, i) => {
    const isActive = songs[currentIndex].id === song.id;
    const globalIndex = songs.indexOf(song);
    return `
      <div class="song-item ${isActive ? 'active' : ''}" onclick="selectSong(${globalIndex})">
        <div class="song-num">
          <span class="num-txt">${song.featured ? '⭐' : i + 1}</span>
          <div class="bars">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
          </div>
        </div>
        <div class="song-icon">${song.emoji}</div>
        <div class="song-meta">
          <div class="song-name">${song.title}</div>
          <div class="song-tag">${song.mood}${song.featured ? ' · 12k views on YouTube' : ''}</div>
        </div>
      </div>
    `;
  }).join('');
}

function selectSong(index) {
  loadSong(index);
  if (!isPlaying) togglePlay();
  else audio.play();
}

// Audio events
audio.addEventListener('timeupdate', () => {
  if (audio.duration) {
    const pct = (audio.currentTime / audio.duration) * 100;
    progressFill.style.width = pct + '%';
    currentTimeEl.textContent = formatTime(audio.currentTime);
    totalTimeEl.textContent = formatTime(audio.duration);
  }
});

audio.addEventListener('ended', () => {
  if (!isRepeat) nextSong();
});

audio.addEventListener('error', () => {
  console.log('Audio error — check Google Drive permissions');
});

// Init
audio.volume = 0.8;
loadSong(0);
renderList();
</script>
</body>
</html>
