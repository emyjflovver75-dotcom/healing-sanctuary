<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Sanctuary — Our Healing Sanctuary</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --dark: #1a1510;
  --purple: #6B4F8C;
  --purple-light: #9b7bc0;
  --sage: #7a9e7e;
  --sage-light: #a8c5ac;
  --gold-light: #e8d5b0;
  --font-display: 'Cormorant Garamond', Georgia, serif;
  --font-body: 'DM Sans', sans-serif;
}
body { background: #0f0d0b; color: white; font-family: var(--font-body); min-height: 100vh; overflow-x: hidden; }
body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse 80% 60% at 20% 20%, rgba(107,79,140,0.12) 0%, transparent 60%), radial-gradient(ellipse 60% 80% at 80% 80%, rgba(122,158,126,0.08) 0%, transparent 60%); pointer-events: none; z-index: 0; }
.header { padding: 20px 40px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.06); position: relative; z-index: 10; }
.header-logo { font-family: var(--font-display); font-size: 16px; font-style: italic; color: var(--gold-light); opacity: 0.8; }
.header-center { font-family: var(--font-display); font-size: 20px; font-weight: 300; letter-spacing: 0.05em; }
.header-back { font-size: 11px; color: rgba(255,255,255,0.35); cursor: pointer; letter-spacing: 0.1em; text-transform: uppercase; text-decoration: none; transition: color 0.2s; }
.header-back:hover { color: var(--sage-light); }
.main { display: grid; grid-template-columns: 1fr 340px; min-height: calc(100vh - 65px); position: relative; z-index: 1; }
.now-playing { padding: 40px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.yt-wrap { width: 100%; max-width: 480px; border-radius: 20px; overflow: hidden; margin-bottom: 28px; box-shadow: 0 20px 80px rgba(0,0,0,0.6), 0 0 60px rgba(107,79,140,0.2); display: none; }
.yt-wrap.visible { display: block; }
.yt-wrap iframe { width: 100%; height: 270px; border: none; display: block; }
.vinyl-wrap { position: relative; margin-bottom: 28px; }
.vinyl-glow { position: absolute; inset: -30px; border-radius: 50%; background: radial-gradient(circle, rgba(107,79,140,0.25) 0%, transparent 70%); animation: glowPulse 3s ease-in-out infinite; }
@keyframes glowPulse { 0%, 100% { opacity: 0.5; transform: scale(1); } 50% { opacity: 1; transform: scale(1.08); } }
.vinyl { width: 220px; height: 220px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #2a2020, #0f0d0b); display: flex; align-items: center; justify-content: center; position: relative; box-shadow: 0 0 0 1px rgba(255,255,255,0.06), 0 20px 80px rgba(0,0,0,0.7), 0 0 60px rgba(107,79,140,0.2); animation: spin 14s linear infinite; animation-play-state: paused; }
.vinyl.playing { animation-play-state: running; }
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
.vinyl::before { content: ''; position: absolute; inset: 20px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.03); box-shadow: 0 0 0 20px rgba(255,255,255,0.02), 0 0 0 40px rgba(255,255,255,0.015); }
.vinyl-center { width: 64px; height: 64px; border-radius: 50%; background: linear-gradient(135deg, var(--purple), var(--sage)); display: flex; align-items: center; justify-content: center; font-size: 26px; z-index: 1; box-shadow: 0 4px 24px rgba(107,79,140,0.5); }
.song-info { text-align: center; margin-bottom: 24px; }
.song-mood { font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--sage-light); margin-bottom: 8px; }
.song-title { font-family: var(--font-display); font-size: 32px; font-weight: 300; color: white; line-height: 1.15; margin-bottom: 6px; }
.song-artist { font-size: 12px; color: rgba(255,255,255,0.35); letter-spacing: 0.04em; }
.progress-wrap { width: 100%; max-width: 380px; margin-bottom: 22px; }
.progress-times { display: flex; justify-content: space-between; font-size: 11px; color: rgba(255,255,255,0.25); margin-bottom: 8px; }
.progress-track { height: 4px; background: rgba(255,255,255,0.08); border-radius: 2px; cursor: pointer; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--purple), var(--sage)); border-radius: 2px; width: 0%; transition: width 1s linear; position: relative; }
.progress-fill::after { content: ''; position: absolute; right: -5px; top: -3px; width: 10px; height: 10px; border-radius: 50%; background: white; box-shadow: 0 0 8px rgba(107,79,140,0.6); }
.controls { display: flex; align-items: center; gap: 20px; margin-bottom: 24px; }
.ctrl-btn { width: 44px; height: 44px; border: none; background: rgba(255,255,255,0.05); border-radius: 50%; color: rgba(255,255,255,0.4); font-size: 15px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; font-family: var(--font-body); }
.ctrl-btn:hover { background: rgba(255,255,255,0.1); color: white; }
.play-btn { width: 66px; height: 66px; background: linear-gradient(135deg, var(--purple), var(--sage)); border: none; border-radius: 50%; color: white; font-size: 20px; cursor: pointer; transition: all 0.25s; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 32px rgba(107,79,140,0.45); }
.play-btn:hover { transform: scale(1.08); box-shadow: 0 12px 44px rgba(107,79,140,0.6); }
.volume-wrap { display: flex; align-items: center; gap: 12px; width: 100%; max-width: 380px; }
.vol-icon { font-size: 13px; color: rgba(255,255,255,0.25); }
input[type=range] { flex: 1; height: 3px; background: rgba(255,255,255,0.08); border-radius: 2px; appearance: none; outline: none; cursor: pointer; }
input[type=range]::-webkit-slider-thumb { appearance: none; width: 13px; height: 13px; border-radius: 50%; background: var(--purple-light); cursor: pointer; }
audio { display: none; }
.playlist { border-left: 1px solid rgba(255,255,255,0.06); display: flex; flex-direction: column; }
.playlist-header { padding: 28px 24px 18px; border-bottom: 1px solid rgba(255,255,255,0.06); }
.playlist-label { font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--sage); margin-bottom: 5px; }
.playlist-title { font-family: var(--font-display); font-size: 20px; font-weight: 300; }
.mood-filters { padding: 14px 24px; display: flex; flex-wrap: wrap; gap: 6px; border-bottom: 1px solid rgba(255,255,255,0.06); }
.mood-btn { font-size: 10.5px; padding: 5px 11px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.08); background: transparent; color: rgba(255,255,255,0.35); cursor: pointer; transition: all 0.2s; font-family: var(--font-body); }
.mood-btn:hover { border-color: var(--purple-light); color: var(--purple-light); }
.mood-btn.active { background: rgba(107,79,140,0.18); border-color: var(--purple); color: var(--purple-light); }
.song-list { flex: 1; overflow-y: auto; padding: 8px 0; }
.song-list::-webkit-scrollbar { width: 3px; }
.song-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }
.song-item { display: flex; align-items: center; gap: 12px; padding: 14px 24px; cursor: pointer; transition: all 0.2s; border-left: 3px solid transparent; }
.song-item:hover { background: rgba(255,255,255,0.03); border-left-color: rgba(107,79,140,0.3); }
.song-item.active { background: rgba(107,79,140,0.1); border-left-color: var(--purple); }
.song-num { width: 22px; font-size: 12px; color: rgba(255,255,255,0.2); text-align: center; flex-shrink: 0; }
.song-item.active .song-num { color: var(--purple-light); }
.bars { display: none; gap: 2px; align-items: flex-end; height: 14px; }
.song-item.active .bars { display: flex; }
.song-item.active .num-txt { display: none; }
.bar { width: 3px; border-radius: 2px; background: var(--purple-light); animation: barUp 0.9s ease-in-out infinite; }
.bar:nth-child(2) { animation-delay: 0.2s; }
.bar:nth-child(3) { animation-delay: 0.4s; }
@keyframes barUp { 0%, 100% { height: 3px; } 50% { height: 14px; } }
.song-icon { width: 38px; height: 38px; border-radius: 10px; background: rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; }
.song-item.active .song-icon { background: rgba(107,79,140,0.2); }
.song-meta { flex: 1; min-width: 0; }
.song-name { font-size: 13px; font-weight: 400; color: rgba(255,255,255,0.8); margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.song-item.active .song-name { color: white; font-weight: 500; }
.song-tag { font-size: 10px; color: rgba(255,255,255,0.25); }
.song-item.active .song-tag { color: var(--sage-light); }
.yt-badge { font-size: 9px; background: rgba(255,0,0,0.15); color: #ff6b6b; padding: 2px 7px; border-radius: 6px; border: 1px solid rgba(255,0,0,0.2); margin-left: 4px; }
.stream-note { padding: 14px 24px; border-top: 1px solid rgba(255,255,255,0.06); font-size: 11px; color: rgba(255,255,255,0.2); line-height: 1.5; text-align: center; }
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">Our Healing Sanctuary</div>
  <div class="header-center">🎵 Music Sanctuary</div>
  <a href="index.html" class="header-back">← Back to App</a>
</div>

<div class="main">
  <div class="now-playing">
    <div class="yt-wrap" id="ytWrap">
      <iframe id="ytPlayer" src="" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
    </div>
    <div class="vinyl-wrap" id="vinylWrap">
      <div class="vinyl-glow"></div>
      <div class="vinyl" id="vinyl">
        <div class="vinyl-center" id="vinylEmoji">🌿</div>
      </div>
    </div>
    <div class="song-info">
      <div class="song-mood" id="songMood">Grounding & Calm</div>
      <div class="song-title" id="songTitle">Keep Your Heart</div>
      <div class="song-artist">Emy J · Our Healing Sanctuary</div>
    </div>
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-times">
        <span id="currentTime">0:00</span>
        <span id="totalTime">0:00</span>
      </div>
      <div class="progress-track" onclick="seekAudio(event)">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>
    <div class="controls">
      <button class="ctrl-btn" onclick="prevSong()">⏮</button>
      <button class="ctrl-btn" onclick="shuffleSongs()">🔀</button>
      <button class="play-btn" id="playBtn" onclick="togglePlay()">▶</button>
      <button class="ctrl-btn" onclick="toggleRepeat()" id="repeatBtn">🔁</button>
      <button class="ctrl-btn" onclick="nextSong()">⏭</button>
    </div>
    <div class="volume-wrap" id="volumeWrap">
      <span class="vol-icon">🔈</span>
      <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.8" oninput="setVolume(this.value)">
      <span class="vol-icon">🔊</span>
    </div>
    <audio id="audioPlayer" preload="none"></audio>
  </div>

  <div class="playlist">
    <div class="playlist-header">
      <div class="playlist-label">✦ Original music by Emy J</div>
      <div class="playlist-title">Your Sanctuary Playlist</div>
    </div>
    <div class="mood-filters">
      <button class="mood-btn active" onclick="filterMood('all', this)">All</button>
      <button class="mood-btn" onclick="filterMood('grounding', this)">🌿 Grounding</button>
      <button class="mood-btn" onclick="filterMood('emotional', this)">💜 Emotional</button>
      <button class="mood-btn" onclick="filterMood('morning', this)">☀️ Morning</button>
      <button class="mood-btn" onclick="filterMood('sleep', this)">🌙 Sleep</button>
      <button class="mood-btn" onclick="filterMood('strength', this)">💪 Strength</button>
    </div>
    <div class="song-list" id="songList"></div>
    <div class="stream-note">🌿 Original music by Emy J<br>Our Healing Sanctuary · All rights reserved</div>
  </div>
</div>

<script>
const songs = [
  { id:1, title:"Keep Your Heart", mood:"Grounding & Calm", moodKey:"grounding", emoji:"🌿", type:"mp3", src:"keep-your-heart.mp3.mp3" },
  { id:2, title:"Safe to Feel", mood:"Emotional Release", moodKey:"emotional", emoji:"💜", type:"mp3", src:"safe-to-feel.mp3.mp3" },
  { id:3, title:"Morning Move", mood:"Morning Energy", moodKey:"morning", emoji:"☀️", type:"mp3", src:"morning-move.mp3.mp3" },
  { id:4, title:"Soft Lanterns of the Heart", mood:"Sleep & Rest", moodKey:"sleep", emoji:"🌙", type:"mp3", src:"Sleep%26Rest%20Soft%20As%20Breathing.mp3" },
  { id:5, title:"He Will Heal Me", mood:"Strength & Empowerment", moodKey:"strength", emoji:"💪", type:"youtube", src:"HRg84tdeYic", featured:true }
];

let currentIndex=0, isPlaying=false, isRepeat=false, currentFilter='all';
const audio=document.getElementById('audioPlayer');
const playBtn=document.getElementById('playBtn');
const vinyl=document.getElementById('vinyl');
const progressFill=document.getElementById('progressFill');
const currentTimeEl=document.getElementById('currentTime');
const totalTimeEl=document.getElementById('totalTime');
const ytWrap=document.getElementById('ytWrap');
const vinylWrap=document.getElementById('vinylWrap');
const progressWrap=document.getElementById('progressWrap');
const volumeWrap=document.getElementById('volumeWrap');
const ytPlayer=document.getElementById('ytPlayer');

function formatTime(sec){ if(isNaN(sec))return'0:00'; return Math.floor(sec/60)+':'+(Math.floor(sec%60)+'').padStart(2,'0'); }

function loadSong(index){
  currentIndex=index;
  const song=songs[index];
  document.getElementById('songTitle').textContent=song.title;
  document.getElementById('songMood').textContent=song.mood;
  document.getElementById('vinylEmoji').textContent=song.emoji;
  isPlaying=false; playBtn.textContent='▶'; vinyl.classList.remove('playing');
  if(song.type==='youtube'){
    ytWrap.classList.add('visible');
    vinylWrap.style.display='none';
    progressWrap.style.display='none';
    volumeWrap.style.display='none';
    playBtn.style.display='none';
    ytPlayer.src=`https://www.youtube.com/embed/${song.src}?autoplay=1&rel=0&modestbranding=1`;
    isPlaying=true;
  } else {
    ytWrap.classList.remove('visible');
    vinylWrap.style.display='block';
    progressWrap.style.display='block';
    volumeWrap.style.display='flex';
    playBtn.style.display='flex';
    ytPlayer.src='';
    audio.src=song.src;
    progressFill.style.width='0%';
    currentTimeEl.textContent='0:00';
    totalTimeEl.textContent='0:00';
  }
  renderList();
}

function togglePlay(){
  if(songs[currentIndex].type==='youtube')return;
  if(isPlaying){ audio.pause(); isPlaying=false; playBtn.textContent='▶'; vinyl.classList.remove('playing'); }
  else { audio.play().catch(e=>{}); isPlaying=true; playBtn.textContent='⏸'; vinyl.classList.add('playing'); }
}

function nextSong(){
  const f=getFiltered(); const ci=f.findIndex(s=>s.id===songs[currentIndex].id);
  const ni=(ci+1)%f.length; const gi=songs.indexOf(f[ni]);
  loadSong(gi);
  if(songs[gi].type==='mp3'){ audio.play().catch(e=>{}); isPlaying=true; playBtn.textContent='⏸'; vinyl.classList.add('playing'); }
}

function prevSong(){
  const f=getFiltered(); const ci=f.findIndex(s=>s.id===songs[currentIndex].id);
  const pi=(ci-1+f.length)%f.length; const gi=songs.indexOf(f[pi]);
  loadSong(gi);
  if(songs[gi].type==='mp3'){ audio.play().catch(e=>{}); isPlaying=true; playBtn.textContent='⏸'; vinyl.classList.add('playing'); }
}

function shuffleSongs(){ const f=getFiltered(); const r=f[Math.floor(Math.random()*f.length)]; loadSong(songs.indexOf(r)); }
function toggleRepeat(){ isRepeat=!isRepeat; document.getElementById('repeatBtn').style.color=isRepeat?'#9b7bc0':''; audio.loop=isRepeat; }
function setVolume(val){ audio.volume=val; }
function seekAudio(e){ const r=e.currentTarget.getBoundingClientRect(); if(audio.duration)audio.currentTime=((e.clientX-r.left)/r.width)*audio.duration; }
function getFiltered(){ return currentFilter==='all'?songs:songs.filter(s=>s.moodKey===currentFilter); }

function filterMood(mood,btn){
  currentFilter=mood;
  document.querySelectorAll('.mood-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

function renderList(){
  const filtered=getFiltered();
  document.getElementById('songList').innerHTML=filtered.map((song,i)=>{
    const isActive=songs[currentIndex].id===song.id;
    const gi=songs.indexOf(song);
    return `<div class="song-item ${isActive?'active':''}" onclick="selectSong(${gi})">
      <div class="song-num">
        <span class="num-txt">${song.featured?'⭐':i+1}</span>
        <div class="bars"><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>
      </div>
      <div class="song-icon">${song.emoji}</div>
      <div class="song-meta">
        <div class="song-name">${song.title}${song.type==='youtube'?'<span class="yt-badge">YT</span>':''}</div>
        <div class="song-tag">${song.mood}${song.featured?' · 12k views':''}</div>
      </div>
    </div>`;
  }).join('');
}

function selectSong(index){
  loadSong(index);
  if(songs[index].type==='mp3'){ audio.play().catch(e=>{}); isPlaying=true; playBtn.textContent='⏸'; vinyl.classList.add('playing'); }
}

audio.addEventListener('timeupdate',()=>{ if(audio.duration){ progressFill.style.width=(audio.currentTime/audio.duration*100)+'%'; currentTimeEl.textContent=formatTime(audio.currentTime); totalTimeEl.textContent=formatTime(audio.duration); }});
audio.addEventListener('ended',()=>{ if(!isRepeat)nextSong(); });

audio.volume=0.8;
loadSong(0);
</script>
</body>
</html>
